name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 1
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: test-results
        path: test-results/
        retention-days: 1
    - name: Generate test summary
      run: |
        node -e "
        const fs = require('fs');
        const results = JSON.parse(fs.readFileSync('test-results/results.json', 'utf8'));
        let total = 0, passed = 0, failed = 0, retries = 0, flaky = 0;
        const failedTests = [];
        results.suites.forEach(suite => {
          suite.specs.forEach(spec => {
            spec.tests.forEach(test => {
              total++;
              const lastResult = test.results[test.results.length - 1];
              if (lastResult.status === 'passed') {
                passed++;
                if (test.results.length > 1) flaky++;
              } else {
                failed++;
                failedTests.push(test.title);
              }
              retries += test.results.length - 1;
            });
          });
        });
        let body = \`- Total tests executed: \${total}\n- Passed: \${passed}\n- Failed: \${failed}\n- Retries: \${retries}\n- Flaky tests: \${flaky}\`;
        if (failedTests.length > 0) {
          body += '\n\nFailed tests:\n' + failedTests.map(t => '- ' + t).join('\n');
        }
        body += '\n\nDownload full report and screenshots: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}';
        fs.writeFileSync('summary.txt', body);
        "
    - name: Send email report
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: ${{ secrets.SMTP_SERVER }}
        server_port: ${{ secrets.SMTP_PORT }}
        username: ${{ secrets.SMTP_USERNAME }}
        password: ${{ secrets.SMTP_PASSWORD }}
        subject: Playwright Test Report
        body: file://summary.txt
        to: your-email@example.com
        from: github-actions@example.com
